<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monster Mayhem - Shop</title>

    <link rel="stylesheet" href="shop.css">
</head>

<body>

<!-- TOP NAV BAR -->
<div class="top-nav">

    <div class="nav-links">
        <a href="login.html">👤 Log Out</a>
        <a href="index.html">🎮 Classic Game</a>
        <a href="challenge.html">⚡ Survival Mode</a>
        <a href="shop.html" class="active">🪙 Shop</a>
    </div>

    <div class="user-info" id="userDisplay">
        Not logged in
    </div>

</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- SHOP SECTION -->
    <div class="shop-section">

        <h2>🛒 Character Shop</h2>

        <p class="shop-text">
            Spend coins to unlock monsters
        </p>

        <!-- CLASSIC -->
        <div class="character-item">
            <span>👾 Classic</span>
            <span>FREE</span>
            <span>Owned</span>
        </div>

        <!-- DRAGON -->
        <div class="character-item">
            <span>🐉 Dragon</span>
            <span>50 coins</span>
            <button onclick="buyCharacter('🐉', 50)">
                Buy
            </button>
        </div>

        <!-- GHOST -->
        <div class="character-item">
            <span>👻 Ghost</span>
            <span>100 coins</span>
            <button onclick="buyCharacter('👻', 100)">
                Buy
            </button>
        </div>

        <!-- SKULL -->
        <div class="character-item">
            <span>💀 Skull</span>
            <span>200 coins</span>
            <button onclick="buyCharacter('💀', 200)">
                Buy
            </button>
        </div>

    </div>

</div>

<script src="shop.js"></script>

</body>
</html>
